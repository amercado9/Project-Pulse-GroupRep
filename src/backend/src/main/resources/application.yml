spring:
  application:
    name: project-pulse
  profiles:
    active: dev
  devtools:
    livereload:
      enabled: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

server:
  port: 80

api:
  endpoint:
    base-url: /api/v1

ram:
  lock:
    default-lock-ttl: PT15M

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
  tracing:
    sampling:
      probability: 0.1

info:
  app:
    name: project-pulse
    description: Project Pulse — Senior Design Management Platform
    version: "@project.version@"
